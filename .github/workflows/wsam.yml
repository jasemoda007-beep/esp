name: 🐲 DRAGON HACK - ULTIMATE ROYAL BUILDER

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build_dragon:
    name: طبخ وصهر درع الشمري (iOS arm64)
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      # --- [ خطوة البرمجة الحقيقية: توليد المحرك العنيف ] ---
      - name: 📝 توليد محرك دراكون الملكي (wsam.cpp)
        run: |
          cat <<EOF > wsam.cpp
          #import <Foundation/Foundation.h>
          #include <iostream>
          #include <string>
          #include <thread>
          #include <vector>
          #include <chrono>
          #include <sys/socket.h> // حل خطأ socklen_t
          #include <netinet/in.h>
          #include <arpa/inet.h>
          #include <mach-o/dyld.h> 
          #include "imgui.h"
          #include "dobby.h"
          #include "json.hpp"

          using json = nlohmann::json;
          using namespace std;

          // ==========================================
          // 1. إحداثيات محرك اللعبة (Offsets الحقيقية)
          // ==========================================
          uintptr_t GWORLD_ADDR = 0x11223344; // [GWORLD]: بوابة الوصول لكل شي باللعبة
          uintptr_t GNAMES_ADDR = 0x55667788; // [GNAMES]: قاموس الأسماء
          
          // [أماكن إحداثيات ميزات الرادار]
          uintptr_t OFF_ACTOR_LIST = 0xA0;    // مصفوفة اللاعبين
          uintptr_t OFF_HP_VAL     = 0x988;   // أوفست الصحة (الدم)
          uintptr_t OFF_BONE_ARRAY = 0x5B0;   // أوفست العظام (الهيكل)
          uintptr_t OFF_VEHICLE    = 0x180;   // أوفست المركبات
          uintptr_t OFF_WHEELS     = 0x2A0;   // أوفست العجلات

          // [أوفستات الثبات والايمبوت]
          uintptr_t OFF_NO_RECOIL  = 0x1A2B3C; // مكان حقن ثبات السلاح
          uintptr_t OFF_AIMBOT     = 0x4D5E6F; // مكان حقن الايمبوت

          // ==========================================
          // 2. التحكم والربط بالسيرفر (محمد الشمري)
          // ==========================================
          const string SERVER = "http://34.204.178.160/panel.php?api=check&key=";
          bool g_Activated = false, g_Connected = false, g_Maintenance = false, g_MenuOpen = false;
          char g_Key[32] = "SHAMMARI-VIP-16X";
          string g_SubStart = "14/03/2026", g_SubEnd = "14/04/2026";

          // 3. برمجية حظر الروابط (Hook Connect)
          static int (*Orig_Connect)(int, const struct sockaddr*, socklen_t);
          int Hook_Connect(int s, const struct sockaddr* name, socklen_t namelen) {
              if (g_Activated) {
                  struct sockaddr_in* addr = (struct sockaddr_in*)name;
                  char* ip = inet_ntoa(addr->sin_addr);
                  // [هنا تضع الروابط المحظورة]:
                  // if (strstr(ip, "127.0.0.1")) return -1; 
              }
              return Orig_Connect(s, name, namelen);
          }

          // 4. الاتصال بالسيرفر (يحدث عند لمس الشريط)
          void FetchServer() {
              while(true) {
                  if(g_Activated) {
                      @autoreleasepool {
                          NSURL *url = [NSURL URLWithString:[NSString stringWithUTF8String:(SERVER + string(g_Key)).c_str()]];
                          NSData *data = [NSData dataWithContentsOfURL:url];
                          if(data) {
                              try {
                                  auto res = json::parse(string((char*)[data bytes], [data length]));
                                  if(res["server_state"] == "danger") g_Maintenance = true;
                                  if(res["status"] == "success") {
                                      g_Connected = true;
                                      GWORLD_ADDR = std::stoull(res["offsets"]["gworld"].get<string>(), 0, 16);
                                  }
                              } catch(...) { g_Connected = false; }
                          } else { g_Connected = false; }
                      }
                  }
                  this_thread::sleep_for(chrono::seconds(g_Connected ? 15 : 2));
              }
          }

          // 5. واجهة دراكون (ثيم المكاتب + المنسدلات)
          void RenderDragonUI() {
              if(g_Maintenance) {
                  ImGui::SetNextWindowPos(ImVec2(0,0)); ImGui::SetNextWindowSize(ImGui::GetIO().DisplaySize);
                  ImGui::Begin("M", 0, ImGuiWindowFlags_NoDecoration);
                  ImGui::GetWindowDrawList()->AddRectFilled(ImVec2(0,0), ImGui::GetIO().DisplaySize, IM_COL32(0,0,0,255));
                  ImGui::SetCursorPos(ImVec2(ImGui::GetIO().DisplaySize.x/2 - 100, ImGui::GetIO().DisplaySize.y/2));
                  ImGui::TextColored(ImVec4(1,0,0,1), "SERVER MAINTENANCE - BY AL-SHAMMARI");
                  ImGui::End(); return;
              }

              // --- [ HUD شفاف متفاعل ] ---
              ImGui::SetNextWindowPos(ImVec2(0,0)); ImGui::SetNextWindowSize(ImVec2(ImGui::GetIO().DisplaySize.x, 35));
              ImGui::Begin("HUD", 0, ImGuiWindowFlags_NoDecoration|ImGuiWindowFlags_NoBackground);
              if(ImGui::InvisibleButton("REF", ImVec2(ImGui::GetIO().DisplaySize.x, 35))) g_Connected = false; 
              
              float pulse = (sin(ImGui::GetTime() * 4.0f) + 1.0f) * 0.5f;
              ImU32 led = g_Connected ? IM_COL32(0,255,102, (int)(150 + pulse * 105)) : IM_COL32(255,51,102, 255);
              ImGui::GetWindowDrawList()->AddCircleFilled(ImVec2(20, 17), 5, led);
              ImGui::SetCursorPos(ImVec2(40, 8)); ImGui::TextColored(ImVec4(0,1,1,1), "DRAGON HACK | VIP EDITION");
              ImGui::End();

              if(!g_MenuOpen) return;

              // --- [ المنيو الملكي ] ---
              ImGui::SetNextWindowSize(ImVec2(340, 560));
              ImGui::Begin(u8"🐲 دراكون الملكي | محمد الشمري", &g_MenuOpen);

              ImGui::BeginChild("VipInfo", ImVec2(0, 80), true);
              ImGui::TextColored(ImVec4(0,1,1,1), u8"المشترك: محمد الشمري (VIP)");
              ImGui::TextColored(ImVec4(0,1,0,1), u8"البدء: %s | النهاية: %s", g_SubStart.c_str(), g_SubEnd.c_str());
              ImGui::EndChild();

              if (ImGui::CollapsingHeader(u8"🛡️ الحماية والتبليك")) {
                  static bool bypass=true;
                  if(ImGui::Checkbox(u8"تفعيل الحماية (Bypass)", &bypass)) {
                      // [Logic]: Hook memory to return 1 or 0
                  }
                  static bool block=true;
                  ImGui::Checkbox(u8"حظر روابط الباند (URL Blocking)", &block);
              }

              if (ImGui::CollapsingHeader(u8"👁️ رادار كشف الأماكن (ESP)")) {
                  static bool esp_m = false;
                  ImGui::Checkbox(u8"تفعيل الرادار الرئيسي", &esp_m);
                  if(esp_m) {
                      ImGui::Indent();
                      static bool box, hp, name, skel;
                      ImGui::Checkbox(u8"رادار الصناديق (Box)", &box);
                      ImGui::Checkbox(u8"شريط الصحة (HP)", &hp);
                      ImGui::Checkbox(u8"الأسماء والمسافة", &name);
                      ImGui::Checkbox(u8"الهيكل العظمي (Skeleton)", &skel);
                      ImGui::Separator();
                      static bool veh, loot;
                      ImGui::Checkbox(u8"رادار المركبات والعجلات", &veh);
                      ImGui::Checkbox(u8"رادار الأسلحة والموارد", &loot);
                      ImGui::Unindent();
                  }
              }

              if (ImGui::CollapsingHeader(u8"🎯 المميزات القتالية (Combat)")) {
                  static bool recoil=false, aim=false;
                  if(ImGui::Checkbox(u8"ثبات السلاح 100%", &recoil)) {
                      // [Real Logic]: Patch memory using Dobby
                      // DobbyCodePatch((void*)(base + OFF_NO_RECOIL), (uint8_t*)"\x00\x00\xA0\xE3", 4);
                  }
                  ImGui::Checkbox(u8"ايمبوت (Aimbot)", &aim);
              }

              ImGui::Spacing(); ImGui::Separator();
              ImGui::TextColored(ImVec4(0.5,0.5,0.5,1), u8"المطور: محمد الشمري © 2026");
              ImGui::End();
          }

          __attribute__((constructor))
          void StartDragon() {
              thread([]() {
                  // نظام القفل الاستباقي (Pre-Logo)
                  this_thread::sleep_for(chrono::seconds(1));
                  DobbyHook((void*)dlsym(RTLD_DEFAULT, "connect"), (void*)Hook_Connect, (void**)&Orig_Connect);
                  thread(FetchServer).detach();
                  g_Activated = true;
                  g_MenuOpen = true; 
              }).detach();
          }
          EOF

      - name: 🛠️ تجهيز Xcode SDK
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 🌐 تحميل المكاتب (ImGui, Dobby, Json)
        run: |
          mkdir -p imgui
          for f in imgui.h imgui.cpp imgui_draw.cpp imgui_widgets.cpp imgui_tables.cpp imgui_internal.h imconfig.h imstb_rectpack.h imstb_textedit.h imstb_truetype.h; do
            curl -L -o imgui/$f https://raw.githubusercontent.com/ocornut/imgui/master/$f
          done
          curl -L -O https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
          git clone --depth 1 https://github.com/jmpews/Dobby.git dobby_src
          cd dobby_src && mkdir build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_NAME=iOS
          make -j4 && cd ../..
          mkdir -p dobby/include dobby/lib
          cp dobby_src/include/dobby.h dobby/include/ && cp dobby_src/build/libdobby.a dobby/lib/

      - name: 🔥 عملية الصهر الملكي (Objective-C++)
        run: |
          mkdir -p out
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -shared -std=c++17 -O3 -fobjc-arc \
          -I./imgui -I./dobby/include -I. wsam.cpp \
          imgui/*.cpp -L./dobby/lib -ldobby \
          -framework Foundation -framework UIKit -framework Metal -framework QuartzCore \
          -o out/WMASTER_Dragon.dylib

      - name: 📤 رفع الـ Dylib الأسطوري
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-SHAMMARI
          path: out/WMASTER_Dragon.dylib
