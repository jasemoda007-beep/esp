name: 🦅 DRAGON HACK - ULTIMATE BUILDER

# يشتغل السكريبت تلقائياً عند كل رفع للكود (Push) أو تشغيل يدوي
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build_dragon:
    name: طبخ حماية محمد الشمري (iOS arm64)
    runs-on: macos-latest

    steps:
      # 1. جلب ملفات المشروع (wsam.cpp)
      - name: 📥 جلب الكود المصدري
        uses: actions/checkout@v4

      # 2. تجهيز بيئة التطوير الخاصة بالايفون
      - name: 🛠️ تجهيز Xcode SDK
        run: |
          echo "جاري تجهيز بيئة حماية محمد الشمري..."
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 3. جلب كافة المكتبات المطلوبة (ImGui الملكية و Dobby و Json)
      - name: 🌐 تحميل النواقص (Auto-Fetch Libraries)
        run: |
          echo "جاري تحميل مكتبة ImGui كاملة..."
          mkdir -p imgui
          for file in imgui.h imgui.cpp imgui_draw.cpp imgui_widgets.cpp imgui_tables.cpp imgui_internal.h imconfig.h imstb_rectpack.h imstb_textedit.h imstb_truetype.h; do
            curl -L -o imgui/$file https://raw.githubusercontent.com/ocornut/imgui/master/$file
          done

          echo "جاري تحميل مكتبة json.hpp..."
          curl -L -O https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp

          echo "جاري تحميل وبناء مكتبة Dobby للايفون..."
          git clone --depth 1 https://github.com/jmpews/Dobby.git dobby_src
          cd dobby_src && mkdir build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_SYSTEM_PROCESSOR=arm64
          make -j$(sysctl -n hw.ncpu)
          cd ../..
          mkdir -p dobby/include dobby/lib
          cp dobby_src/include/dobby.h dobby/include/
          cp dobby_src/build/libdobby.a dobby/lib/

      # 4. عملية الصهر (Compilation) - تحويل الـ C++ إلى ملف Dylib
      - name: 🔥 صهر ملف الـ Dylib (Objective-C++)
        run: |
          echo "بدء عملية الصهر العنيفة..."
          mkdir -p build_output
          
          # أمر التجميع الملكي للايفون (مع دعم Objective-C++ لضمان عمل الاتصال بالشبكة)
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -shared -std=c++17 -O3 -fobjc-arc \
          -I./imgui -I./dobby/include -I. \
          wsam.cpp \
          ./imgui/imgui.cpp ./imgui/imgui_draw.cpp ./imgui/imgui_widgets.cpp ./imgui/imgui_tables.cpp \
          -L./dobby/lib -ldobby \
          -framework Foundation -framework UIKit -framework Metal -framework QuartzCore \
          -o build_output/WMASTER_Dragon.dylib
          
          echo "✅ تمت عملية الصهر بنجاح! ملف محمد الشمري جاهز."

      # 5. رفع الملف الناتج للتحميل (Artifacts) باستخدام الإصدار الحديث v4
      - name: 📤 رفع ملف الـ Dylib الجاهز
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-SHAMMARI
          path: build_output/WMASTER_Dragon.dylib
